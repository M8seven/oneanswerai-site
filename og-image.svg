<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="75%">
      <stop offset="0%" style="stop-color:#0c0c0c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Tight cyan accent glows (subtle, on-brand) -->
  <circle cx="1010" cy="120" r="150" fill="#00B4FF" opacity="0.05"/>
  <circle cx="200" cy="540" r="110" fill="#00B4FF" opacity="0.04"/>

  <!-- Fusion motif: three provider dots converging into one cyan answer -->
  <g transform="translate(600, 138)">
    <!-- connecting lines to center -->
    <line x1="0" y1="-40" x2="0" y2="0" stroke="#2a2a2a" stroke-width="2"/>
    <line x1="-38" y1="26" x2="0" y2="0" stroke="#2a2a2a" stroke-width="2"/>
    <line x1="38" y1="26" x2="0" y2="0" stroke="#2a2a2a" stroke-width="2"/>
    <!-- provider rings -->
    <circle cx="0" cy="-40" r="20" fill="none" stroke="#34C759" stroke-width="3"/>
    <circle cx="-38" cy="26" r="20" fill="none" stroke="#2D7FF9" stroke-width="3"/>
    <circle cx="38" cy="26" r="20" fill="none" stroke="#FF9F0A" stroke-width="3"/>
    <!-- fused answer -->
    <circle cx="0" cy="0" r="13" fill="#00B4FF"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="262" font-family="'Space Grotesk', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="600" fill="#00B4FF" text-anchor="middle"
        letter-spacing="6">ONEANSWERAI</text>

  <!-- Main title -->
  <text x="600" y="360" font-family="'Space Grotesk', Helvetica, Arial, sans-serif"
        font-size="78" font-weight="700" fill="#ffffff" text-anchor="middle"
        letter-spacing="-2">Three AIs. One Answer.</text>

  <!-- Subtitle: AI families (no model trademarks) -->
  <text x="600" y="430" font-family="Helvetica, Arial, sans-serif"
        font-size="34" font-weight="400" fill="#9a9a9a" text-anchor="middle"
        letter-spacing="1">OpenAI &#183; Google Gemini &#183; Anthropic Claude</text>

  <!-- Footer URL -->
  <text x="1164" y="600" font-family="Helvetica, Arial, sans-serif"
        font-size="24" font-weight="400" fill="#777777" text-anchor="end">one-answer-ai.com</text>

  <!-- Top-left accent dots -->
  <circle cx="40" cy="40" r="6" fill="#00B4FF" opacity="0.6"/>
  <circle cx="64" cy="40" r="4" fill="#00B4FF" opacity="0.35"/>
  <circle cx="84" cy="40" r="3" fill="#00B4FF" opacity="0.2"/>
</svg>
